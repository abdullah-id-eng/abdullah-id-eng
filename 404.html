<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الصفحة غير موجودة | Page Not Found - ABDULLAH ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: var(--bg-main);
        color: var(--text-main);
        text-align: center;
        font-family: "Tajawal", sans-serif;
        overflow: hidden;
      }
      .error-container {
        padding: 40px;
        max-width: 600px;
        width: 90%;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }
      h1 {
        font-size: 5rem;
        color: var(--primary-color);
        margin: 0;
        line-height: 1;
      }
      .message-ar {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 20px 0 10px;
        color: #fff;
      }
      .message-en {
        font-size: 1.2rem;
        color: var(--text-muted);
        margin-bottom: 30px;
        direction: ltr;
      }
      .btn-home {
        display: inline-block;
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: #fff;
        padding: 12px 30px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn-home:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="background-effects">
      <div class="grid-overlay"></div>
      <div class="glow-orb orb-primary"></div>
      <div class="glow-orb orb-secondary"></div>
    </div>

    <div class="error-container glass-card">
      <h1>404</h1>
      <div class="message-ar">عذراً، الصفحة التي تبحث عنها غير موجودة!</div>
      <div class="message-en">
        Sorry, the page you are looking for does not exist!
      </div>
      <a href="index.html" class="btn-home">العودة للرئيسية | Back to Home</a>
    </div>
  </body>
</html>
